# ==============================================================================
# NODO WORKER — data-platform/worker/docker-compose.yml
#
# Servicios:
#   • airflow-worker   → Celery Worker (puede escalarse horizontalmente)
#   • airflow-flower   → Monitor de Celery (perfil opcional)
#   • git-sync         → sincronización de DAGs desde Git
#
# Este nodo se conecta al master vía IP privada de la VPC:
#   - RabbitMQ en MASTER_PRIVATE_IP:5672
#   - PostgreSQL en POSTGRES_HOST (RDS o master)
#
# Requisitos previos en el host worker:
#   sudo mkdir -p /data/airflow/{dags,logs,plugins}
#   sudo chown -R 50000:0 /data/airflow
# ==============================================================================
version: "3.9"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  restart: unless-stopped
  env_file:
    - ../.env
  environment:
    # Core
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}

    # Base de datos (misma RDS que el master)
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
      postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}

    # Celery — apunta al RabbitMQ del MASTER por IP privada de la VPC
    AIRFLOW__CELERY__BROKER_URL: >-
      amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@${MASTER_PRIVATE_IP}:5672/${RABBITMQ_DEFAULT_VHOST}
    AIRFLOW__CELERY__RESULT_BACKEND: >-
      db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    AIRFLOW__CELERY__WORKER_CONCURRENCY: ${WORKER_CONCURRENCY}
    AIRFLOW__CELERY__WORKER_AUTOSCALE: "${WORKER_MAX_CONCURRENCY},${WORKER_MIN_CONCURRENCY}"
    AIRFLOW__CELERY__TASK_ACKS_LATE: "true"

    # Logging
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW__LOGGING__LOG_LEVEL: INFO

    # Clave compartida (debe ser idéntica a la del master)
    AIRFLOW__WEBSERVER__SECRET_KEY: ${WEBSERVER_SECRET_KEY}

  volumes:
    - ../airflow/dags:/opt/airflow/dags:ro    # read-only en workers
    - ../airflow/logs:/opt/airflow/logs
    - ../airflow/plugins:/opt/airflow/plugins:ro
  networks:
    - airflow_net

# ==============================================================================
services:

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  airflow-worker:
    <<: *airflow-common
    command: celery worker -q ${WORKER_QUEUE}
    environment:
      # Identificador único del worker en el cluster Celery
      AIRFLOW__CELERY__DEFAULT_QUEUE: ${WORKER_QUEUE}
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          celery --app airflow.executors.celery_executor.app inspect ping
          -d "celery@$${HOSTNAME}" --timeout 10
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 90s
    deploy:
      replicas: ${WORKER_REPLICAS}
      resources:
        limits:
          cpus: "${WORKER_CPU_LIMIT}"
          memory: ${WORKER_MEM_LIMIT}
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ── Flower — Monitor de Celery (levantar con: --profile monitoring) ───────────
  airflow-flower:
    <<: *airflow-common
    command: celery flower
    ports:
      - "127.0.0.1:5555:5555"   # SSH tunnel para acceso seguro
    profiles:
      - monitoring
    environment:
      FLOWER_BASIC_AUTH: "${FLOWER_USER}:${FLOWER_PASSWORD}"

  # ── Git Sync — misma imagen que en master ─────────────────────────────────────
  git-sync:
    image: registry.k8s.io/git-sync/git-sync:v4.2.1
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      GITSYNC_REPO: ${GIT_SYNC_REPO}
      GITSYNC_BRANCH: ${GIT_SYNC_BRANCH}
      GITSYNC_ROOT: /git
      GITSYNC_LINK: dags
      GITSYNC_PERIOD: 60s
      GITSYNC_SSH_KEY_FILE: /etc/git-secret/id_rsa
      GITSYNC_SSH_KNOWN_HOSTS: "false"
    volumes:
      - ../airflow/dags:/git
      - ${GIT_SSH_KEY_PATH}:/etc/git-secret/id_rsa:ro
    networks:
      - airflow_net

# ==============================================================================
networks:
  airflow_net:
    driver: bridge
